# ==============================================================================
# Student Helpdesk Agent — Enterprise Docker Compose Deployment
# ==============================================================================
# Orchestrates 3 services:
# 1. MongoDB Database (or Online Atlas Cloud via MONGODB_URI env)
# 2. Express Backend Server (Port 5000 internal, auto-seeded)
# 3. Vite React Frontend + Nginx Reverse Proxy (Port 80 / 5173 / 3000)
# ==============================================================================

version: '3.8'

services:
  # --------------------------------------------------------------------------
  # Service 1: MongoDB Database (Persistent Local Storage)
  # Note: If using MongoDB Atlas Cloud, the server service uses MONGODB_URI
  # from your .env file and overrides this local database.
  # --------------------------------------------------------------------------
  mongodb:
    image: mongo:latest
    container_name: helpdesk_mongodb
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    environment:
      MONGO_INITDB_DATABASE: student_helpdesk
    networks:
      - helpdesk_net
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  # --------------------------------------------------------------------------
  # Service 2: Express Backend Server (API & AI Agent Engine)
  # --------------------------------------------------------------------------
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: helpdesk_server
    restart: always
    depends_on:
      mongodb:
        condition: service_healthy
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
      # Uses MONGODB_URI from .env if provided (for MongoDB Online Atlas),
      # otherwise defaults to the docker internal mongodb service!
      - MONGODB_URI=${MONGODB_URI:-mongodb://mongodb:27017/student_helpdesk}
      - CLIENT_URL=${CLIENT_URL:-http://localhost}
      - JWT_SECRET=${JWT_SECRET:-helpdesk-super-secret-key-2026-enterprise}
      - GROK_API_KEY=${GROK_API_KEY}
    volumes:
      - server_logs:/app/logs
    networks:
      - helpdesk_net
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5000/api"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # --------------------------------------------------------------------------
  # Service 3: Frontend Web Application + Nginx Reverse Proxy
  # --------------------------------------------------------------------------
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api
    container_name: helpdesk_client
    restart: always
    depends_on:
      server:
        condition: service_healthy
    ports:
      - "80:80"       # Standard HTTP
      - "3000:80"     # Standard React port alias
      - "5173:80"     # Standard Vite port alias
    networks:
      - helpdesk_net
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s

# ------------------------------------------------------------------------------
# Persistent Docker Volumes
# ------------------------------------------------------------------------------
volumes:
  mongodb_data:
    name: helpdesk_mongodb_data
  mongodb_config:
    name: helpdesk_mongodb_config
  server_logs:
    name: helpdesk_server_logs

# ------------------------------------------------------------------------------
# Isolated Internal Network
# ------------------------------------------------------------------------------
networks:
  helpdesk_net:
    name: helpdesk_network
    driver: bridge
